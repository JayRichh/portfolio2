<section class="contact-form">
  <form (submit)="onSubmit($event)" autocomplete="on">
    <div *ngIf="isSubmitting()" class="loading-overlay">
      <div class="spinner"></div>
      <p>Sending your message...</p>
    </div>

    <div class="form-grid">
      <div class="form-fields">
        <div class="field-group">
          <input
            appInput
            type="text"
            name="name"
            placeholder="Name *"
            [ngModel]="formData().name"
            (ngModelChange)="updateField('name', $event)"
            required
            [class.error]="fieldErrors().name"
          />
          <span *ngIf="fieldErrors().name as err" class="error-message">{{ err }}</span>
        </div>

        <div class="field-group">
          <input
            appInput
            type="email"
            name="email"
            placeholder="Email *"
            [ngModel]="formData().email"
            (ngModelChange)="updateField('email', $event)"
            required
            [class.error]="fieldErrors().email"
          />
          <span *ngIf="fieldErrors().email as err" class="error-message">{{ err }}</span>
        </div>

        <div class="field-group">
          <textarea
            appTextarea
            name="message"
            placeholder="Message *"
            rows="4"
            [ngModel]="formData().message"
            (ngModelChange)="updateField('message', $event)"
            required
            [class.error]="fieldErrors().message"
          ></textarea>
          <span *ngIf="fieldErrors().message as err" class="error-message">{{ err }}</span>
        </div>

        <div class="honeypot" aria-hidden="true">
          <label for="website-url">Website</label>
          <input
            id="website-url"
            type="text"
            name="website"
            tabindex="-1"
            autocomplete="off"
            [ngModel]="honeypot()"
            (ngModelChange)="honeypot.set($event)"
          />
        </div>
      </div>

      <app-drawing-canvas />
    </div>

    <div class="form-actions">
      <button appButton variant="outline" type="button" (click)="clearForm()">
        Clear All
      </button>
      <button appButton type="submit" [disabled]="isSubmitting()">
        Send Message
      </button>
    </div>

    <div *ngIf="status()" class="status-message" [class.success]="statusSuccess()" [class.error]="!statusSuccess()">
      {{ statusMessage() }}
    </div>
  </form>
</section>
